# ===== DATABASE CONFIGURATION =====
# Database host (default: localhost)
db.host=${DB_HOST:localhost}

# Database port (default: 1433 for SQL Server)
db.port=${DB_PORT:1433}

# Database name
db.name=${DB_NAME:QLCF}

# Database username
db.user=${DB_USER:sa}

# Database password
db.password=${DB_PASSWORD:}

# ===== CONNECTION POOL CONFIGURATION =====
# Maximum number of connections in the pool
db.pool.max-size=${DB_POOL_MAX:20}

# Minimum number of idle connections
db.pool.min-idle=${DB_POOL_MIN:5}

# Connection timeout in milliseconds
db.pool.connection-timeout=${DB_POOL_TIMEOUT:30000}

# ===== SERVER CONFIGURATION =====
# Server port
server.port=${SERVER_PORT:8080}

# Session timeout in minutes
server.session.timeout=${SESSION_TIMEOUT:30}

# ===== ENCRYPTION & SECURITY =====
# SQL Server encryption settings
db.encrypt=true
db.trust-server-certificate=true

# ===== LOGGING =====
# Log level (INFO, DEBUG, ERROR)
log.level=${LOG_LEVEL:INFO}